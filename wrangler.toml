# Cloudflare Pages + Functions config for the Recomp Tracker.
# The frontend is built by Astro into ./dist and served by Pages.
# Files under ./functions become Pages Functions (the /api/* backend).
name = "recomp-tracker"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"

# D1 binding — available in Functions as env.DB.
# Create the database once, then paste its id below:
#   npx wrangler d1 create recomp-db
[[d1_databases]]
binding = "DB"
database_name = "recomp-db"
database_id = "089f5900-8fa4-4869-b3a3-0bf37a4c6b9f"

# SESSION_TTL_DAYS controls how long a login stays valid.
# Set real secrets/vars in the Pages dashboard or via:
#   npx wrangler pages secret put <NAME>
[vars]
SESSION_TTL_DAYS = "90"
ALLOW_REGISTRATION = "true"
