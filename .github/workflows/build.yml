name: Build

# Status check on every PR into main / develop. Ensures the Astro PWA
# compiles cleanly before merge. We intentionally skip the `push:` trigger
# because every commit reaching main / develop has already been built as
# part of its PR — re-running on the post-merge push wastes CI minutes.

on:
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: pnpm build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build
        env:
          # Cloudflare Pages serves from the root, so build with base "/".
          BASE_PATH: /
