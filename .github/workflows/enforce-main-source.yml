name: Enforce main-source policy

# Blocks merging into `main` unless the PR source branch is `develop`.
# This is one half of the "main only receives from develop" policy — paired
# with the branch protection rule that requires this check to pass.

on:
  pull_request:
    branches: [main]
    types: [opened, edited, reopened, synchronize]

jobs:
  check-source:
    name: PR source must be develop
    runs-on: ubuntu-latest
    steps:
      - name: Verify PR head ref
        run: |
          head="${{ github.event.pull_request.head.ref }}"
          echo "PR head ref: $head"
          if [ "$head" != "develop" ]; then
            echo "::error::PRs targeting 'main' must come from the 'develop' branch. This PR is from '$head'."
            exit 1
          fi
          echo "✓ Source branch is 'develop'."
