# Deploys the Astro site to GitHub Pages on every push to main.
# Requirements:
#  - In the repo: Settings > Pages > Build and deployment > Source = "GitHub Actions".
#  - For a PROJECT site (https://<user>.github.io/<repo>/) nothing else is needed:
#    BASE_PATH is derived from the repo name automatically below.
#  - For a USER/ORG site (repo named <user>.github.io) or a custom domain,
#    change BASE_PATH to "/" in the build step env.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v3
        with:
          path: .
        env:
          # Project site: "/<repo>/". For a root/user site, set this to "/".
          BASE_PATH: /${{ github.event.repository.name }}/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
